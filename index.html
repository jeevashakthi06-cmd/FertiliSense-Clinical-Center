<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FertiCare AI</title>
<style>
  :root {
    --wa-header: #075E54;
    --wa-teal-light: #128C7E;
    --wa-bg: #E5DDD5;
    --wa-bubble-in: #FFFFFF;
    --wa-bubble-out: #DCF8C6;
    --wa-text: #111B21;
    --wa-meta: #667781;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0B141A;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone {
    width: 400px;
    max-width: 100%;
    height: 720px;
    background: var(--wa-bg);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    background: var(--wa-header);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #FFB6C1, #FF69B4);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .header-info { flex: 1; min-width: 0; }
  .header-name { font-weight: 600; font-size: 16px; line-height: 1.2; }
  .header-status { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }

  .reset-btn {
    background: rgba(255,255,255,0.15);
    border: none; color: white; font-size: 12px;
    padding: 6px 10px; border-radius: 14px; cursor: pointer;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.28); }

  .messages {
    flex: 1; overflow-y: auto; padding: 14px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }

  .msg-row { display: flex; margin: 4px 0; }
  .msg-row.out { justify-content: flex-end; }
  .msg-row.in { justify-content: flex-start; }

  .bubble {
    max-width: 78%; padding: 7px 10px 8px 10px; border-radius: 8px;
    font-size: 14.5px; line-height: 1.4; white-space: pre-wrap;
    word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
  .bubble.in { background: var(--wa-bubble-in); color: var(--wa-text); border-top-left-radius: 2px; }
  .bubble.out { background: var(--wa-bubble-out); color: var(--wa-text); border-top-right-radius: 2px; }
  .bubble .time { display: block; font-size: 10.5px; color: var(--wa-meta); text-align: right; margin-top: 3px; }

  .typing {
    display: flex; gap: 4px; padding: 10px 12px;
    background: var(--wa-bubble-in); border-radius: 8px;
    border-top-left-radius: 2px; width: fit-content;
  }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #a0a0a0; animation: blink 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

  .input-bar { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #F0F0F0; flex-shrink: 0; }
  .input-bar input { flex: 1; border: none; border-radius: 20px; padding: 10px 16px; font-size: 14.5px; outline: none; background: white; }

  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--wa-header);
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.15s;
  }
  .send-btn:hover { background: var(--wa-teal-light); }
  .send-btn:disabled { opacity: 0.5; cursor: default; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .disclaimer-banner {
    background: #FFF3CD; color: #664D03; font-size: 11px; text-align: center;
    padding: 5px 10px; border-bottom: 1px solid #FFE69C; flex-shrink: 0;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <div class="avatar">🌸</div>
    <div class="header-info">
      <div class="header-name">FertiCare AI</div>
      <div class="header-status" id="status">connecting...</div>
    </div>
    <button class="reset-btn" id="resetBtn">Restart</button>
  </div>
  <div class="disclaimer-banner">Educational lifestyle info only — not medical advice or diagnosis.</div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input type="text" id="userInput" placeholder="Type a message" autocomplete="off" disabled>
    <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// Point this at your backend. Defaults to a local Flask server.
const BACKEND_URL = "http://localhost:5000";

let sessionId = null;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const resetBtn = document.getElementById('resetBtn');
const statusEl = document.getElementById('status');

function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addBubble(text, who) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + who;
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + who;
  bubble.textContent = text;
  const time = document.createElement('span');
  time.className = 'time';
  time.textContent = nowTime();
  bubble.appendChild(time);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row in';
  row.id = 'typingRow';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

function setEnabled(enabled) {
  inputEl.disabled = !enabled;
  sendBtn.disabled = !enabled;
}

async function startSession() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/session`, { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    statusEl.textContent = 'online';
    setEnabled(true);

    showTyping();
    const reply = await sendToBackend("Say hello and ask your first question to begin the fertility lifestyle assessment.");
    hideTyping();
    addBubble(reply, 'in');
  } catch (err) {
    statusEl.textContent = 'offline';
    addBubble(
      "Can't reach the backend at " + BACKEND_URL + ". Make sure it's running " +
      "(see backend/README.md) and refresh this page.",
      'in'
    );
    console.error(err);
  }
}

async function sendToBackend(message) {
  const res = await fetch(`${BACKEND_URL}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, message })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Request failed (${res.status})`);
  }
  const data = await res.json();
  return data.reply;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !sessionId) return;

  addBubble(text, 'out');
  inputEl.value = '';
  setEnabled(false);
  statusEl.textContent = 'typing...';
  showTyping();

  try {
    const reply = await sendToBackend(text);
    hideTyping();
    addBubble(reply, 'in');
  } catch (err) {
    hideTyping();
    addBubble("Something went wrong reaching the assistant. Please try again.", 'in');
    console.error(err);
  } finally {
    statusEl.textContent = 'online';
    setEnabled(true);
    inputEl.focus();
  }
}

async function resetChat() {
  if (!sessionId) return;
  await fetch(`${BACKEND_URL}/api/reset`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId })
  });
  messagesEl.innerHTML = '';
  showTyping();
  const reply = await sendToBackend("Say hello and ask your first question to begin the fertility lifestyle assessment.");
  hideTyping();
  addBubble(reply, 'in');
}

sendBtn.addEventListener('click', sendMessage);
resetBtn.addEventListener('click', resetChat);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

startSession();
</script>

</body>
</html>
